<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <h1>미션</h1>
    <div id="root"></div>
    <script type="text/babel">

        function App() {
            return (
                <>
                    {/* 미션1) 아래와 같이 컴포넌트를 호출할 때 전달한 color를 배경색으로 가지도록 컴포넌트를 구현하세요. 박스크기(100*100) */}
                    <ColorBox color={"red"} />
                    <ColorBox color={"green"} />
                    {/* 미션2) 아래와 같이 컴포넌트를 호출할 때 전달한 data를 리스트 형태로 출력하도록 컴포넌트를 구현하세요. */}
                    <Items data={["봄", "여름", "가을", "겨울"]} />
                    <Items data={["김치찌개", "된장찌개"]} />
                    {/* 미션3) 아래와 같이 컴포넌트를 호출할 때 전달한 friend 객체의 속성값을 출력하도록 컴포넌트를 구현하세요. */}
                    <Person friend={{ name: "jack", age: 20 }} />
                    <Person friend={{ name: "john", age: 30 }} />
                    {/* 미션4) 아래와 같이 컴포넌트를 호출할 때 내부 요소로 전달한 값을 정사각형의 너비로 계산하여 정사각형의 넓이를 출력하는 컴포넌트를 구현하세요. */}
                    <Square>50</Square>
                    <Square>100</Square>
                </>
            )
        }

        const ColorBox = ({ color }) => {
            const style = {
                backgroundColor: color,
                width: 100,
                height: 100
            }
            return (
                <div style={style}>
                </div>
            )
        }

        const Items = ({ data }) => {
            return (
                <ul>
                    {data.map((item, index) => <Item key={index} item={item} />)}
                </ul>
            )
        }

        const Item = ({ item }) => {
            return (
                <li>
                    {item}
                </li>
            )
        }

        const Person = ({ friend }) => {
            console.log(friend)
            const { name, age } = friend
            return (
                <p>{`이름:${name} 나이: ${age}`}</p>
            )
        }


        const Square = ({ children }) => {
            const style = {
                width: Number(children),
                height: Number(children),
                backgroundColor: 'black',
                marginTop: 10,
                color: 'white'
            }
            return (
                <div style={style}>
                    {`넓이: ${children * children}`}
                </div>
            )

        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    </script>
</body>

</html>
