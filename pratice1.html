<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>

<body>
    <div id="root1"></div>

    <script type="text/babel">

        // 연습1) 아래 변수에 저장된 값을 <div> 태그로 화면에 표시하세요.
        const name = 'Tom';

        const root1 = ReactDOM.createRoot(document.querySelector('#root1'));
        const divTom = React.createElement('div', { id: 'title' }, name);
        root1.render(divTom);

    </script>

    <div id="root2"></div>
    <script type="text/babel">
        // 연습2) 아래 객체에 저장된 값 중 model 속성만 <div> 태그로 화면에 표시하세요.
        const car = {
            model: 'sorento',
            price: 4000,
        }

        const divCar = <div>{car.model}</div>
        ReactDOM.createRoot(document.querySelector('#root2')).render(divCar);
    </script>

    <div id="root3"></div>
    <script type="text/babel">
        // 연습3) 아래 score 값이 60 이상이면 "합격", 아니면 "불합격"을 <div> 태그로 화면에 표시하세요.
        const score = 80;
        const resultDiv = <div>{score >= 60 ? '합격' : '불합격'}</div>
        ReactDOM.createRoot(document.querySelector('#root3')).render(resultDiv);
    </script>

    <div id="root4"></div>
    <script type="text/babel">
        // 연습4) 아래 변수에 저장된 값이 없으면 "값없음", 값이 있으면 저장된 값을 <div> 태그로 화면에 표시하세요.
        let value = 20;
        const typeDiv = <div>{value ?? '값없음'}</div>
        ReactDOM.createRoot(document.querySelector('#root4')).render(typeDiv);

    </script>

    <div id="root5"></div>
    <script type="text/babel">
        // 연습5) 아래 color 값이 "r"이면 "red", "g"이면 "green", "b"이면 "blue" 배경색을 <div> 태그에 적용해 화면에 표시하세요.
        //       (100 x 100 크기)
        const color = 'b';
        const background = color === 'r' ? 'red' : color === 'g' ? 'green' : color === 'b' ? 'blue' : 'white'

        const colorDiv = <div style={{
            backgroundColor: color === 'r' ? 'red' : color === 'g' ? 'green' : color === 'b' ? 'blue' : 'white',
            width: 100,
            height: 100
        }}></div>
        ReactDOM.createRoot(document.querySelector('#root5')).render(colorDiv);

    </script>
</body>

</html>
